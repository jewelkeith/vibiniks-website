  function initNavSocials() {
    document.querySelectorAll(".navbar__menu").forEach((menu) => {
      if (menu.dataset.processed === "true") return;
      menu.dataset.processed = "true";

      const domains = ["youtube.com", "pinterest.com"];

      const items = [...menu.children];

      const socials = items.filter((li) => {
        const a = li.querySelector("a");
        return a && domains.some((d) => a.href.includes(d));
      });

      if (!socials.length) return;

      const wrapper = document.createElement("li");
      wrapper.className = "custom-nav-socials-wrapper";

      const list = document.createElement("ul");
      list.className = "custom-nav-socials-list";

      socials.forEach((i) => list.appendChild(i));

      wrapper.appendChild(list);
      menu.appendChild(wrapper);
    });

  function initBlogNavCustom() {
    const nav = document.querySelector(".home-template .filter");
    if (!nav) return;

    nav.id = "blog-nav";

    const buttons = Array.from(nav.querySelectorAll(".filter__item"));
    if (!buttons.length) return;

    // Extract original data
    const items = buttons.map((btn) => {
      const filter = btn.dataset.filter;
      const slug = filter ? filter.replace(".", "") : "";
      const label = btn.textContent.trim();

      return { slug, label };
    });

    // Clear original nav
    nav.innerHTML = "";

    // Define groups
    const groups = {
      Lifestyle: [],
      Season: [],
      Top: [],
      Featured: [],
    };

    // Explicit labels for curated groups
    const lifestyleLabels = [
      "Brunch Outfits",
      "Casual Outfits",
      "Going Out Outfits",
      "Travel Outfits",
      "Work Outfits",
    ];

    const seasonLabels = ["Spring & Summer", "Fall & Winter"];

    const featuredLabels = ["Outfit Roundup"];

    // Categorize items
    items.forEach((item) => {
      // Skip the original "All" button
      if (!item.slug) return;

      if (lifestyleLabels.includes(item.label)) {
        groups.Lifestyle.push(item);
      } else if (seasonLabels.includes(item.label)) {
        groups.Season.push(item);
      } else if (item.slug.endsWith("-top")) {
        groups.Top.push(item);
      } else if (featuredLabels.includes(item.label)) {
        groups.Featured.push(item);
      }
    });

    // Main heading (collapsible)
    const heading = document.createElement("h3");
    heading.className = "filter-main-title";
    heading.textContent = "Filter posts by: ▾";
    heading.style.cursor = "pointer";

    nav.appendChild(heading);

    // Container for all nav content
    const content = document.createElement("div");
    content.className = "blog-nav-content";
    content.style.display = "none";

    nav.appendChild(content);

    // All Posts link
    const allParagraph = document.createElement("p");
    allParagraph.className = "blog-nav-all-outfits";

    const allLink = document.createElement("a");
    allLink.textContent = "All Posts";
    allLink.href = "#blog-nav";

    allParagraph.appendChild(allLink);
    content.appendChild(allParagraph);

    // Toggle entire nav
    let navOpen = false;

    heading.addEventListener("click", () => {
      navOpen = !navOpen;

      content.style.display = navOpen ? "flex" : "none";
      heading.textContent = `Filter posts by: ${navOpen ? "▴" : "▾"}`;
    });

    // Create collapsible groups
    function createGroup(title, items) {
      if (!items.length) return null;

      const wrapper = document.createElement("div");
      wrapper.className = "filter-group";

      const h = document.createElement("h4");
      const ul = document.createElement("ul");

      let open = false;

      ul.style.display = "none";

      h.textContent = `${title}: ▾`;
      h.style.cursor = "pointer";

      h.addEventListener("click", () => {
        open = !open;

        ul.style.display = open ? "flex" : "none";
        h.textContent = `${title}: ${open ? "▴" : "▾"}`;
      });

      items.forEach((item) => {
        const li = document.createElement("li");
        const a = document.createElement("a");

        a.textContent = item.label;
        a.href = `https://vibiniks.com/tags/${item.slug}/`;

        li.appendChild(a);
        ul.appendChild(li);
      });

      wrapper.appendChild(h);
      wrapper.appendChild(ul);

      return wrapper;
    }

    [
      ["Lifestyle", groups.Lifestyle],
      ["Season", groups.Season],
      ["Top", groups.Top],
      ["Featured", groups.Featured],
    ].forEach(([title, groupItems]) => {
      const el = createGroup(title, groupItems);

      if (el) {
        content.appendChild(el);
      }
    });
  }

  function initPagination() {
    const container = document.querySelector(".ml-grid");
    const pagination = document.querySelector(".pagination");

    if (!container) return;

    let nextUrl = pagination?.querySelector('a[rel="next"]')?.href || null;

    if (!nextUrl) return;

    const loadMoreBtn = document.createElement("button");
    loadMoreBtn.className = "custom-btn-load-more";
    loadMoreBtn.type = "button";
    loadMoreBtn.textContent = "Load More";

    pagination.insertAdjacentElement("afterend", loadMoreBtn);
    pagination.remove();

    let isLoading = false;

    loadMoreBtn.addEventListener("click", async () => {
      if (isLoading || !nextUrl) return;

      isLoading = true;

      const originalText = loadMoreBtn.textContent;
      loadMoreBtn.textContent = "Loading...";
      loadMoreBtn.disabled = true;

      try {
        const response = await fetch(nextUrl);
        if (!response.ok) throw new Error("Fetch failed");

        const html = await response.text();
        const doc = new DOMParser().parseFromString(html, "text/html");

        const newPosts = doc.querySelectorAll(".ml-grid article.c-card");

        if (!newPosts.length) {
          loadMoreBtn.remove();
          return;
        }

        // Append posts
        newPosts.forEach((post) => {
          container.appendChild(post.cloneNode(true));
        });

        // 🔥 IMPORTANT: force layout recalculation
        requestAnimationFrame(() => {
          window.dispatchEvent(new Event("resize"));
        });

        // Update next page URL
        nextUrl = doc.querySelector('.pagination a[rel="next"]')?.href || null;

        if (!nextUrl) {
          loadMoreBtn.remove();
        } else {
          loadMoreBtn.textContent = originalText;
          loadMoreBtn.disabled = false;
        }
      } catch (err) {
        console.error("Load More failed:", err);
        loadMoreBtn.textContent = "Try Again";
        loadMoreBtn.disabled = false;
      } finally {
        isLoading = false;
      }
    });
  }

  function initPostStructure() {
    const article = document.querySelector(".post-template .content__entry");

    if (article) {
      const nodes = Array.from(article.children);

      let sections = [];
      let current = [];

      function flushSection() {
        if (current.length) {
          sections.push(current);
          current = [];
        }
      }

      nodes.forEach((node) => {
        if (node.tagName === "HR") {
          flushSection();
        } else {
          current.push(node);
        }
      });

      flushSection();

      article.innerHTML = "";

      const totalSections = sections.length;

      sections.forEach((sectionNodes, index) => {
        const section = document.createElement("div");
        section.className = "post-section";

        if (index === 0) {
          section.classList.add("post-section-start");
        } else if (index === totalSections - 1) {
          section.classList.add("post-section-end");
        }

        const hasLeftFigure = sectionNodes.some(
          (node) =>
            node.tagName === "FIGURE" &&
            (node.classList.contains("post__image--left") ||
              node.querySelector(".post__image--left")),
        );

        if (hasLeftFigure) {
          section.classList.add("post-section-two-col");
        }

        const textBlock = document.createElement("div");
        textBlock.className = "post-section-text";

        let figure = null;

        sectionNodes.forEach((node) => {
          if (node.tagName === "FIGURE" && !figure) {
            figure = node;
            return;
          }

          if (
            node.tagName === "H1" ||
            node.tagName === "H2" ||
            node.tagName === "H3" ||
            node.tagName === "P"
          ) {
            textBlock.appendChild(node);
            return;
          }

          textBlock.appendChild(node);
        });

        if (figure) {
          section.appendChild(figure);
        }

        section.appendChild(textBlock);
        article.appendChild(section);
      });
    }
  }

  function initEmptyParagraphs() {
    if (document.body.classList.contains("home-template")) return;

    let hidden = [];

    const handle = () => {
      const isMobile = window.innerWidth <= 768;
      const paragraphs = document.querySelectorAll("p");

      if (isMobile) {
        hidden = [];

        paragraphs.forEach((p) => {
          const empty =
            p.innerHTML.trim() === "&nbsp;" || p.textContent.trim() === "";

          if (empty) {
            hidden.push(p);
            p.style.display = "none";
          }
        });
      } else {
        hidden.forEach((p) => (p.style.display = ""));
        hidden = [];
      }
    };

    handle();
    window.addEventListener("resize", handle);
  }

  function initTOC() {
    const toc = document.querySelector(".post__toc");
    if (!toc) return;

    const h = toc.querySelector("h3");
    const ul = toc.querySelector("ul");
    if (!h || !ul) return;

    const title = h.textContent.trim();

    ul.style.display = "none";
    let open = false;

    h.textContent = title + " ▾";
    h.style.cursor = "pointer";

    h.addEventListener("click", () => {
      open = !open;
      ul.style.display = open ? "block" : "none";
      h.textContent = title + (open ? " ▴" : " ▾");
    });
  }

  function initGalleryAffiliates() {
    const cfg = window.MATCHA;
    if (!cfg) return;

    document.querySelectorAll(".custom-gallery-lightbox").forEach((gallery) => {
      const figures = gallery.querySelectorAll("figure");

      figures.forEach((figure) => {
        const caption = figure.querySelector("figcaption");
        if (!caption) return;

        const key = caption.textContent.trim();
        const affiliateId = cfg.galleryMap[key];

        if (!affiliateId || !cfg.affiliateLinks[affiliateId]) return;

        if (figure.dataset.affInit === "true") return;
        figure.dataset.affInit = "true";

        const wrapper = document.createElement("div");
        wrapper.className = "custom-figure-wrapper-lightbox";

        if (figure.closest(".custom-gallery-normal")) {
          wrapper.classList.add("custom-figure-wrapper-normal");
        }

        figure.parentNode.insertBefore(wrapper, figure);
        wrapper.appendChild(figure);

        const btn = document.createElement("a");
        btn.href = cfg.affiliateLinks[affiliateId];
        btn.target = "_blank";
        btn.rel = "nofollow sponsored noopener noreferrer";
        btn.className = figure.closest(".custom-gallery-normal")
          ? "custom-btn custom-btn-ter"
          : "custom-btn custom-btn-pri";

        btn.textContent = "Shop on Amazon";

        wrapper.appendChild(btn);
      });
    });
  }

  function initCarousel() {
    const galleries = document.querySelectorAll(
      ".custom-gallery-lightbox.custom-gallery-normal",
    );

    if (!galleries.length) return;

    galleries.forEach((gallery) => {
      const container = gallery.closest(".custom-gallery-carousel");
      if (!container) return;

      const prevBtn = container.querySelector(".custom-gallery-nav-prev");
      const nextBtn = container.querySelector(".custom-gallery-nav-next");

      const item = gallery.querySelector(".custom-figure-wrapper-normal");
      const scrollAmount = item ? item.offsetWidth : 320;

      prevBtn?.addEventListener("click", () => {
        gallery.scrollBy({ left: -scrollAmount, behavior: "smooth" });
      });

      nextBtn?.addEventListener("click", () => {
        gallery.scrollBy({ left: scrollAmount, behavior: "smooth" });
      });

      requestAnimationFrame(() => {
        if (gallery.scrollWidth > gallery.clientWidth) {
          gallery.scrollLeft = (gallery.scrollWidth - gallery.clientWidth) / 2;
        }
